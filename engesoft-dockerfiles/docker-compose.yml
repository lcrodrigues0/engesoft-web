services:
  db:
    image: postgres:15
    container_name: db-engesoft
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../engesoft-backend
      dockerfile: ../engesoft-dockerfiles/back/Dockerfile
    container_name: back-engesoft
    restart: always
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
    depends_on:
      - db
    command: sh -c "npx prisma migrate deploy && npx prisma generate && npm run dev"
    volumes:
      - ../engesoft-backend:/app
      - /app/node_modules

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-engesoft
    restart: always
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD}
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  frontend:
    build:
      context: ../engesoft-frontend
      dockerfile: ../engesoft-dockerfiles/front/Dockerfile
    container_name: front-engesoft
    restart: always
    ports:
      - "${FRONTEND_PORT}:3000"
    enviroment:
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    volumes:
      - ../engesoft-frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  pgadmin_data:
