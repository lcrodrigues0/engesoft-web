services:
  db:
    image: postgres:15
    container_name: db-engesoft
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: engesoft_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../engesoft-backend
      dockerfile: ../engesoft-dockerfiles/back/Dockerfile
    container_name: back-engesoft
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:pass@db:5432/engesoft_db
      JWT_SECRET: secret
      JWT_REFRESH_SECRET: refresh_secret
    depends_on:
      - db
    command: sh -c "npx prisma migrate dev --config=src/prisma.config.ts && npx prisma generate && npm run dev"
    volumes:
      - ../engesoft-backend:/app
      - /app/node_modules
    
  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin-engesoft
    restart: always
    ports:
      - "5050:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    volumes:
      - pgadmin_data:/var/lib/pgadmin

  frontend:
    build:
      context: ../engesoft-frontend
      dockerfile: ../engesoft-dockerfiles/front/Dockerfile
    container_name: front-engesoft
    restart: always
    ports:
      - "3001:3000"
    volumes:
      - ../engesoft-frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
  pgadmin_data:
