services:
  db:
    image: postgres:15
    container_name: db-engesoft
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: engesoft_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build:
      context: ../engesoft-backend
      dockerfile: ../engesoft-dockerfiles/back/Dockerfile
    container_name: back-engesoft
    restart: always
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:pass@db:5432/engesoft_db
      JWT_SECRET: secret
      JWT_REFRESH_SECRET: refresh_secret
    depends_on:
      - db
    # command: sh -c "npx prisma migrate deploy && npm run start"
    command: sh -c "npm run start"


  
volumes:
  postgres_data: